<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleccionar raza</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pantalla-razas">

  <main class="razas-card">

    <h1>Selecciona tu raza</h1>

    <div class="razas-auth">

      <button
        class="btn-sayajin"
        onclick="seleccionarRaza('sayajin')">
        Sayajin
      </button>

      <button
        class="btn-freezer"
        onclick="seleccionarRaza('freezer')">
        Demonio del frío
      </button>

      <button
        class="btn-namekiano"
        onclick="seleccionarRaza('namekiano')">
        Namekiano
      </button>

      <button
        class="btn-majin"
        onclick="seleccionarRaza('majin')">
        Majin
      </button>

      <button
        class="btn-humano"
        onclick="seleccionarRaza('humano')">
        Humano
      </button>

    </div>

  </main>

  <script src="raza.js"></script>

</body>
</html>
