<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personajes Famosos</title>
  <link rel="stylesheet" href="style.css">
  <script>
    const raza = localStorage.getItem('raza');

    const temas = {
      sayajin: '#ff8c00',
      majin: '#ff4fc3',
      humano: '#2196f3',
      namekiano: '#2ecc71',
      freezer: '#b388ff'
    };

    const brillos = {
      sayajin: 'rgba(255, 140, 0, 0.6)',
      majin: 'rgba(255, 79, 195, 0.6)',
      humano: 'rgba(33, 150, 243, 0.6)',
      namekiano: 'rgba(46, 204, 113, 0.6)',
      freezer: 'rgba(179, 136, 255, 0.6)'
    };

    if (raza && temas[raza]) {
      document.documentElement.style.setProperty(
        '--color-principal',
        temas[raza]
      );

      document.documentElement.style.setProperty(
        '--color-brillo',
        brillos[raza]
      );
    }
  </script>
</head>
<body>

  <header class="header" id="header-principal">

    <div class="header-contenido">
      <h1>Dragon Ball Patroller Time OC</h1>

      <nav class="menu-principal">
        <a href="index.html">Home</a>
        <a href="crear-combos.html">Combos</a>
        <a href="famosos.html">Famosos</a>
        <a href="perfil.html">Perfil</a>
      </nav>
    </div>

    <img id="banner-raza" class="icono-raza">

  </header>

  <main class="container">
    <section class="section">
      <h2>Biblioteca por raza</h2>

      <div class="navbar">
        <button onclick="reproducirSonidoBoton(); mostrarPersonajes('sayajin')">Sayajin</button>
        <button onclick="reproducirSonidoBoton(); mostrarPersonajes('humano')">Humano</button>
        <button onclick="reproducirSonidoBoton(); mostrarPersonajes('namekiano')">Namekiano</button>
        <button onclick="reproducirSonidoBoton(); mostrarPersonajes('majin')">Majin</button>
        <button onclick="reproducirSonidoBoton(); mostrarPersonajes('freezer')">Demonio del frío</button>
      </div>

      <div class="carrusel-contenedor">

        <button class="btn-carrusel" onclick="reproducirSonidoBoton(); moverCarrusel(-1)">
            ←
        </button>

        <div id="riel-personajes" class="riel-personajes"></div>

        <button class="btn-carrusel" onclick="reproducirSonidoBoton(); moverCarrusel(1)">
            →
        </button>

        </div>
    </section>
  </main>

  <script src="sonidos.js"></script>
  <script src="auth.js"></script>
  <script src="tema.js"></script>
  <script src="famosos.js"></script>
</body>
</html>
